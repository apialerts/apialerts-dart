name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Test
        run: dart test
      - name: Notify
        run: dart example/run.dart --release
        env:
          APIALERTS_API_KEY: ${{ secrets.APIALERTS_API_KEY }}
