name: Publish to pub.dev

# pub.dev OIDC only trusts tokens from a tag push or workflow_dispatch,
# never a release event. Tag pattern matches pub.dev's default `v{{version}}`.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pub.dev # pub.dev requires the OIDC token to carry this environment claim
    permissions:
      id-token: write # required for pub.dev OIDC
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test
        run: dart test
      - name: Publish
        run: dart pub publish --force
      - name: Notify
        run: dart example/run.dart --publish
        env:
          APIALERTS_API_KEY: ${{ secrets.APIALERTS_API_KEY }}
